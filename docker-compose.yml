version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: motionwear
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    ports:
      - "9000:9000"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"

  backend:
    build:
      context: ./motionwear-ai/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/motionwear
      JWT_SECRET: change-me
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./motionwear-ai/backend
    command: celery -A app.celery_app.celery worker --loglevel=info
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./motionwear-ai
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
